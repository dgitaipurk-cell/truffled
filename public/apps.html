      <div class="content">
         <h4>Apps</h4>
         <div id="searchCount" style="color: #ffffff; text-align: center; font-family: 'Poppins', sans-serif; font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px;">Loading apps...</div>

      <script>
         const PROXY_SETTING_KEY = "proxyBackend";
         const PENDING_PROXY_URL_KEY = "pendingProxyUrl";
         const ACTIVE_PROXY_BACKEND_KEY = "activeProxyBackend";
 
         class AppLoader {
         constructor() {
             this.apps = [];
             this.totalApps = 0;
             this.popularApps = [
                 "Youtube",
                 "Discord",
                 "Tiktok",
                 "Argon",
                 "Snapchat"
             ];
            this.connection = new BareMux.BareMuxConnection("/baremux/worker.js")
         }
         getSavedProxyBackend() {
             return localStorage.getItem(PROXY_SETTING_KEY) || "uv";
         }
         getEffectiveProxyBackend(value = this.getSavedProxyBackend()) {
             return value === "scramjet" ? "scramjet" : "uv";
         }
         decodeUvUrl(url) {
             if (typeof url !== "string" || !url.startsWith("/active/go/")) {
                 return url;
             }
             const encoded = url.slice("/active/go/".length);
             if (!encoded) {
                 return url;
             }
             try {
                 const [pathPart, ...queryParts] = encoded.split("?");
                 const decodedPath = decodeURIComponent(pathPart);
                 let output = "";
                 for (let index = 0; index < decodedPath.length; index += 1) {
                     output += index % 2
                         ? String.fromCharCode(decodedPath.charCodeAt(index) ^ 2)
                         : decodedPath[index];
                 }
                 return output + (queryParts.length ? "?" + queryParts.join("?") : "");
             } catch (err) {
                 console.error("app url decode error", err);
                 return url;
             }
         }
         async init() {
             try {
                 await this.connection.setTransport("/libcurl/index.mjs", [{ websocket: (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/" }]);
                 await this.directSetIp();
                 await this.loadApps();
                 this.renderApps();
                 this.setupSearch();
                 this.setupLaunchRouting();
                 this.updateAppCount();
                 
             } catch (err) {
                 console.error('app load error', err);
                 this.showError('refresh to fix');
             }
         }
         async directSetIp() {
             try {
                 const res = await fetch('/ip');
                 if (!res.ok) throw new Error('fetch failed');
                 const ip = await res.text();
                 sessionStorage.setItem("prefix", ip);
             } catch (err) {
                 console.error('IP fetch error:', err);
             }
         }
         async loadApps() {
             try {
                 const response = await fetch('/js/json/a.json');
                 if (!response.ok) throw new Error('a.json not found');
                 const data = await response.json();
                 this.apps = data.apps || data.games || [];
                 this.totalApps = this.apps.length;
             } catch (err) {
                 console.error('error loading:', err);
                 throw err;
             }
         }
         getAppUrl(app, backend = this.getEffectiveProxyBackend()) {
             let url = backend === "scramjet"
                 ? (app.scramjetUrl || this.decodeUvUrl(app.url))
                 : app.url;
 
             if (app.requiresPrefix) {
                 const prefix = sessionStorage.getItem("prefix") || '';
                 url = url.replace('{prefix}', prefix);
             }
             if (typeof transformGameUrl === 'function' && backend !== "scramjet") {
                 url = transformGameUrl(url);
             }
             return url;
         }
         getFramePage(app, url, backend = this.getEffectiveProxyBackend()) {
             if (backend === "scramjet" && (app.frameType || "iframe") !== "unity") {
                 return "/search.html";
             }
             if (url.includes('/mobile.html?url=')) {
                 return '/iframe.html';
             }
             const frameType = app?.frameType || 'iframe';
             return frameType === 'unity' ? '/unityframe.html' : '/iframe.html';
         }
         getLaunchHref(app, backend = this.getEffectiveProxyBackend()) {
             const url = this.getAppUrl(app, backend);
             const framePage = this.getFramePage(app, url, backend);
             if (backend === "scramjet" && framePage === "/search.html") {
                 return `${framePage}?backend=scramjet&url=${encodeURIComponent(url)}`;
             }
 
             return `${framePage}?url=${encodeURIComponent(url)}`;
         }         
         renderApps() {
             const gallery = document.getElementById('gameGallery');
             if (!gallery) return;
             gallery.innerHTML = '';
             this.apps.forEach(app => {
                 const appCard = this.createAppCard(app);
                 gallery.appendChild(appCard);
             });
         }
         createAppSuggestionCard() {
             const div = document.createElement('div');
             div.className = 'game';
             div.setAttribute('data-name', 'App Suggestions');
             div.innerHTML = `
                 <a href="https://forms.gle/azBWo53JQN8VNzFt5" class="game-link" data-name="App Suggestions">
                 <img src="/png/games/forms.webp" alt="App Suggestions" class="game-thumbnail">
                 </a>
             `;
             return div;
         }
         createRandomAppCard() {
             const div = document.createElement('div');
             div.className = 'game';
             div.setAttribute('data-name', 'Random app');
             div.onclick = () => this.pickRandomApp();
             div.innerHTML = `
                 <a href="javascript:void(0);" class="game-link" data-name="Random app">
                 <video src="png/vid/random.gif" autoplay muted loop playsinline class="game-thumbnail"></video>
                 </a>
             `;
             return div;
         }
         createAppCard(app) {
             const div = document.createElement('div');
             div.className = 'game';
             div.setAttribute('data-name', app.name);
             if (app.altNames && app.altNames.length > 0) {
                 div.setAttribute('data-names', [app.name, ...app.altNames].join(','));
             }
             const backend = this.getEffectiveProxyBackend();
             const url = this.getAppUrl(app, backend);
             const href = this.getLaunchHref(app, backend);           
             const mediaTag = app.mediaType === 'video' 
                 ? `<video src="${app.thumbnail}" autoplay muted loop playsinline class="game-thumbnail"></video>`
                 : `<img src="${app.thumbnail}" alt="${app.name}" class="game-thumbnail">`;
             div.innerHTML = `
                 <a href="${href}" class="game-link" data-name="${app.name}" data-backend="${backend}" data-url="${encodeURIComponent(url)}">
                 ${mediaTag}
                 </a>
             `;
             return div;
         }
         setupLaunchRouting() {
             const gallery = document.getElementById("gameGallery");
             if (!gallery || gallery.dataset.launchRoutingReady === "true") {
                 return;
             }
             gallery.dataset.launchRoutingReady = "true";
             gallery.addEventListener("click", (event) => {
                 const link = event.target.closest(".game-link[data-backend='scramjet']");
                 if (!link) {
                     return;
                 }
                 const rawUrl = link.dataset.url ? decodeURIComponent(link.dataset.url) : "";
                 if (!rawUrl) {
                     return;
                 }
                 event.preventDefault();
                 sessionStorage.setItem(PENDING_PROXY_URL_KEY, rawUrl);
                 sessionStorage.setItem(ACTIVE_PROXY_BACKEND_KEY, "scramjet");
                 sessionStorage.removeItem("encodedUrl");
                 location.href = link.getAttribute("href") || "/search.html";
             });
         }
         setupSearch() {
             const searchInput = document.getElementById('searchInput');
             const autocomplete = document.getElementById('autocomplete');
             if (!searchInput || !autocomplete) return;
             searchInput.addEventListener('input', (e) => {
                 const filter = e.target.value.toLowerCase().trim();
                 if (!filter) {
                     this.updateAppCount();
                     autocomplete.style.display = 'none';
                     this.showAllApps();
                     return;
                 }
                 const matches = this.findMatches(filter);
                 this.showSuggestions(matches, autocomplete);
                 this.updateAppCount(this.totalApps); 
             });
             searchInput.addEventListener('focus', () => {
                 if (!searchInput.value.trim()) {
                     const popularMatches = this.getPopularApps();
                     this.showSuggestions(popularMatches, autocomplete);
                 }
             });
             document.addEventListener('click', (e) => {
                 if (!autocomplete.contains(e.target) && e.target !== searchInput) {
                     autocomplete.style.display = 'none';
                 }
             });
         }
         findMatches(filter) {
             return this.apps.filter(app => {
                 const names = [app.name, ...(app.altNames || [])];
                 return names.some(name => name.toLowerCase().includes(filter));
             });
         }
         getPopularApps() {
             return this.apps.filter(app => 
                 this.popularApps.includes(app.name)
             );
         }     
         showAllApps() {
             const appCards = document.querySelectorAll('.game-gallery .game');
             appCards.forEach(card => card.style.display = '');
         }
         updateAppCount(count = null) {
             const searchCount = document.getElementById('searchCount');
             if (!searchCount) return;
             if (count === null) {
                 searchCount.textContent = `Showing all ${this.totalApps} apps`;
             } else {
                 searchCount.textContent = `Showing all ${this.totalApps} apps`;
             }
         }
         showError(message) {
             const gallery = document.getElementById('gameGallery');
             if (gallery) {
                 gallery.innerHTML = `
                     <div style="color: white; text-align: center; padding: 2rem; width: 100%;">
                         <p>${message}</p>
                     </div>
                 `;
             }
         }
         }
         document.addEventListener('DOMContentLoaded', () => {
         const loader = new AppLoader();
         loader.init();
         });
      </script>
      <script>
         window.addEventListener('scroll', () => {
             const scrollY = window.scrollY;
             const offsetX = (scrollY * 0.1) % 50; 
             const offsetY = (scrollY * 0.1) % 50;
             document.body.style.setProperty('--scroll-offset-x', `${offsetX}px`);
             document.body.style.setProperty('--scroll-offset-y', `${offsetY}px`);
         });
         document.addEventListener('DOMContentLoaded', () => {
             const style = document.createElement('style');
             style.textContent = `
                 body::before {
                     background-position: var(--scroll-offset-x, 0px) var(--scroll-offset-y, 0px);
                 }
             `;
             document.head.appendChild(style);
         });
      </script>
