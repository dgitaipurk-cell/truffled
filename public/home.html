   <body class="index-page">
      <div class="custom-cursor"></div>
      <div class="navbar-right">
          <a href="/h"><img src="png/house-solid.svg" alt="h"></a>
          <a href="g"><img src="png/gamepad-solid.svg" alt="g"></a>
          <a href="a"><img src="png/apps.svg" alt="a"></a>

          <a href="https://discord.gg/vVqY36mzvj"><img src="png/other.svg" alt="d"></a>
          <a href="s"><img src="png/gear-solid.svg" alt="s"></a>
      </div>
      <div class="content">
         <h1>Welcome to Apricity</h1>
         <form id="uv-form" style="display: flex; flex-direction: column;">
            <input id="search-engine" value="https://duckduckgo.com/?t=h_&ia=web&q=%s" type="hidden" />
            <input id="uv-address" type="text" placeholder="Search Google or type an URL" class="form__input" />
            <div id="random-text" style="font-size: 0.9em; color: gray;"></div>
         </form>
         <div class="legal-links" aria-label="site info">
            <button type="button" class="legal-trigger" data-info-panel="credits">credits</button>
            <span class="legal-links__divider" aria-hidden="true"></span>
            <button type="button" class="legal-trigger" data-info-panel="dmca">dmca</button>
         </div>
         <script>
          const form = document.querySelector("#uv-form");
          const input = document.querySelector("#uv-address");
          const PROXY_SETTING_KEY = "proxyBackend";
          const PENDING_PROXY_URL_KEY = "pendingProxyUrl";
          function isUrl(val = "") {
            if (/^http(s?):\/\//.test(val) || (val.includes(".") && val.slice(0, 1) !== " ")) return true;
            return false;
          }
          function normalizeSearchInput(value) {
            let url = value.trim();
            if (!isUrl(url)) url = "https://duckduckgo.com/?t=h_&ia=web&q=" + encodeURIComponent(url);
            else if (!(url.startsWith("https://") || url.startsWith("http://"))) url = "https://" + url;
            return url;
          }
          function getSavedProxyBackend() { return localStorage.getItem(PROXY_SETTING_KEY) || "uv"; }
          function getEffectiveProxyBackend(value = getSavedProxyBackend()) { return value === "scramjet" ? "scramjet" : "uv"; }
          document.addEventListener("DOMContentLoaded", function () {
            form.addEventListener("submit", async (event) => {
              event.preventDefault();
              const rawValue = input.value.trim();
              if (!rawValue) return;
              const url = normalizeSearchInput(rawValue);
              const backend = getEffectiveProxyBackend();
              sessionStorage.setItem(PENDING_PROXY_URL_KEY, url);
              sessionStorage.setItem("encodedUrl", __uv$config.encodeUrl(url));
              sessionStorage.setItem("activeProxyBackend", backend);
              location.href = "search.html";
            });
          });
          const texts = ["Games with your Desire!", "im a bun im a bun", "Join the discord for more links", "linux > macos", "Chickenbutt", "mario pleaseeeeeee", "you need to NERD OUT", "silksong soon...", "MEOWL", "yall have a good night"];
          const selected = texts[Math.floor(Math.random() * texts.length)];
          const container = document.getElementById("random-text");
          container.innerHTML = "";
          const textNode = document.createElement("span");
          textNode.textContent = selected;
          container.appendChild(textNode);
         </script>
      </div>
      <div id="info-modal" class="info-modal" aria-hidden="true">
         <div class="info-modal__backdrop" data-info-close></div>
         <section class="info-dialog" role="dialog" aria-modal="true" aria-labelledby="info-title">
            <div class="info-dialog__header"><h2 id="info-title">credits</h2></div>
            <div class="info-dialog__body">
               <article id="info-panel-credits" class="info-panel is-active" role="tabpanel" aria-labelledby="info-title">
                  <p>bog - coding everything on site (owner), pages and some webports</p>
                  <p>scramjet & uv static - mercury workshop</p>
               </article>
               <article id="info-panel-dmca" class="info-panel" role="tabpanel" aria-labelledby="info-title" hidden>
                  <p>Apricity is under MIT License</p>
                  <p>Email <a href="mailto:bog@ApricityIsCool.org" style="color: inherit; text-decoration: underline;">bog@ApricityIsCool.org</a> for copyright issues.</p>
               </article>
            </div>
         </section>
      </div>
      <script src="/active/uv.bundle.js" charset="UTF-8" defer></script>
      <script src="/active/uv.config.js" charset="UTF-8" defer></script>
      <script src="/active/register-sw.js" charset="UTF-8" defer></script>
      <script src="/js/theme.js"></script>
      <script src="/js/panic.js"></script>
      <script src="js/cloak.js"></script>
      <script>
      (function () {
        const modal = document.getElementById("info-modal");
        const title = document.getElementById("info-title");
        const triggers = Array.from(document.querySelectorAll(".legal-trigger"));
        const panels = { credits: document.getElementById("info-panel-credits"), dmca: document.getElementById("info-panel-dmca") };
        function setActivePanel(panelName) {
          const normalizedPanel = panels[panelName] ? panelName : "credits";
          title.textContent = normalizedPanel;
          Object.entries(panels).forEach(([name, panel]) => { const isActive = name === normalizedPanel; panel.hidden = !isActive; panel.classList.toggle("is-active", isActive); });
        }
        function openModal(panelName) { setActivePanel(panelName); modal.classList.add("is-open"); modal.setAttribute("aria-hidden", "false"); document.body.classList.add("modal-open"); }
        function closeModal() { modal.classList.remove("is-open"); modal.setAttribute("aria-hidden", "true"); document.body.classList.remove("modal-open"); }
        triggers.forEach((button) => { button.addEventListener("click", () => { openModal(button.dataset.infoPanel || "credits"); }); });
        document.querySelectorAll("[data-info-close]").forEach((button) => { button.addEventListener("click", closeModal); });
      })();
      </script>
   </body>
